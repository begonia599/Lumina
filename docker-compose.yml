services:
  app:
    build: .
    ports:
      - "8081:8080"
    environment:
      - DATABASE_URL=postgres://lumina:lumina@postgres:5432/lumina?sslmode=disable
      - UPLOAD_DIR=/app/uploads
      - PORT=8080
    volumes:
      - uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: lumina
      POSTGRES_PASSWORD: lumina
      POSTGRES_DB: lumina
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lumina"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  uploads:
  pgdata:
